<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – Device Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-signup">

<header class="site-header">
    <h1>Device Management System</h1>
</header>

<main class="container">
    <section class="card card-form">
        <h2>Create Account</h2>

        <form id="signup-form" action="#" method="post">            
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First name</label>
                    <input type="text" id="first-name" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="last-name">Last name</label>
                    <input type="text" id="last-name" name="last_name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="signup-email">Email address</label>
                <input type="email" id="signup-email" name="email" required>
            </div>

            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required>
            </div>

            <div class="form-group">
                <label for="phone-number">Phone number (optional)</label>
                <input type="text" id="phone-number" name="phone_number">
            </div>

            <div class="form-group">
                <label for="address">Address (optional)</label>
                <input type="text" id="address" name="address">
            </div>

            <div class="form-group">
                <label>Account type</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="staff_type" value="normal" checked>
                        Normal staff
                    </label>
                    <label>
                        <input type="radio" name="staff_type" value="it_technician">
                        IT technician
                    </label>
                </div>
            </div>

            <div class="form-group" id="it-extra-fields">
                <label for="specialization">Specialisation (for IT technicians)</label>
                <input type="text" id="specialization" name="specialization" placeholder="e.g. Networking, Hardware">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <a href="login.html" class="link-text">Already have an account? Login</a>
            </div>

            <p id="signup-error" class="form-error"></p>
            <p id="signup-success" class="form-success"></p>
        </form>
    </section>
</main>

<script src="js/signup.js"></script>
</body>
</html>
