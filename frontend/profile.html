<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile – Device Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-profile">

<header class="site-header">
  <div class="header-left">
    <a href="home.html" class="site-title">Device Management System</a>
  </div>

  <nav class="top-nav">
    <span id="user-info"></span>
    <a href="home.html" class="btn btn-small">Home</a>
    <a href="profile.html" class="btn btn-small">Profile</a>
    <a href="index.html" class="btn btn-small">Logout</a>
  </nav>
</header>

<main class="container">
  <section class="card card-form">
    <h2>My Profile</h2>

    <form id="profile-form">
      <div class="form-row">
        <div class="form-group">
          <label for="first-name">First name</label>
          <input id="first-name" type="text" required />
        </div>

        <div class="form-group">
          <label for="last-name">Last name</label>
          <input id="last-name" type="text" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email (read-only)</label>
        <input id="email" type="email" disabled />
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input id="phone" type="text" />
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input id="address" type="text" />
      </div>

      <div class="form-group">
        <label for="password">New password (optional)</label>
        <input id="password" type="password" placeholder="Leave blank to keep current password" />
      </div>

      <button class="btn btn-primary btn-block" type="submit">Save Changes</button>

      <p id="profile-error" class="form-error"></p>
      <p id="profile-success" class="form-success"></p>
    </form>
  </section>
</main>

<script src="js/profile.js"></script>
</body>
</html>
